- name: Install restic
  ansible.builtin.apt:
    name: restic
    state: present
    update_cache: true

- name: Ensure bosco config directory exists
  ansible.builtin.file:
    path: /etc/bosco
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Install backup service
  ansible.builtin.copy:
    dest: /etc/systemd/system/bosco-backup.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=B.O.S.C.O. Restic backup
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      EnvironmentFile=/etc/bosco/restic.env
      ExecStart=/usr/bin/restic backup {{ bosco_data_root }} --tag bosco --exclude **/cache
      ExecStart=/usr/bin/restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 6 --prune
  notify: Reload systemd

- name: Install backup timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/bosco-backup.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Run B.O.S.C.O. backup daily

      [Timer]
      OnCalendar=*-*-* 03:30:00
      Persistent=true

      [Install]
      WantedBy=timers.target
  notify: Reload systemd

- name: Enable backup timer
  ansible.builtin.systemd:
    name: bosco-backup.timer
    enabled: true
    state: started
    daemon_reload: true
