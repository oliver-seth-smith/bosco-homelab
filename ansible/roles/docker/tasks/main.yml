- name: Install Docker dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Install Docker packages from OS repositories
  ansible.builtin.apt:
    name:
      - docker.io
    state: present

- name: Enable Docker service
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Add admin user to docker group
  ansible.builtin.user:
    name: "{{ bosco_admin_user }}"
    groups:
      - docker
    append: true

- name: Check Docker Compose plugin
  ansible.builtin.command: docker compose version
  register: bosco_compose_check
  changed_when: false
  failed_when: false

- name: Ensure Docker CLI plugin directory exists
  ansible.builtin.file:
    path: /usr/local/lib/docker/cli-plugins
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: bosco_compose_check.rc != 0

- name: Install Docker Compose CLI plugin
  ansible.builtin.get_url:
    url: "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-{{ bosco_docker_compose_arch_map[ansible_architecture] }}"
    dest: /usr/local/lib/docker/cli-plugins/docker-compose
    owner: root
    group: root
    mode: "0755"
  when: bosco_compose_check.rc != 0

- name: Verify Docker Compose plugin
  ansible.builtin.command: docker compose version
  changed_when: false
