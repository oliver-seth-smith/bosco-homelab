- name: Install Docker dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Install Docker packages from OS repositories
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-v2
    state: present

- name: Enable Docker service
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Add admin user to docker group
  ansible.builtin.user:
    name: "{{ bosco_admin_user }}"
    groups:
      - docker
    append: true

